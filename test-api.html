<!DOCTYPE html>
<html>
<head>
  <title>Groq API Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 10px 0; }
    #result { margin-top: 20px; padding: 15px; background: #2a2a2a; border: 1px solid #444; border-radius: 5px; white-space: pre-wrap; }
    .error { color: #ff6b6b; }
    .success { color: #51cf66; }
  </style>
</head>
<body>
  <h1>Groq API Connection Test</h1>
  <p>API Key: <span id="keyDisplay"></span></p>
  <button onclick="testConnection()">Test API Connection</button>
  <div id="result"></div>

  <script src="config.js"></script>
  <script>
    const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';
    
    // Display masked API key
    const key = typeof GROQ_API_KEY === 'string' ? GROQ_API_KEY.trim() : '';
    document.getElementById('keyDisplay').textContent = key ? `${key.substring(0, 8)}...${key.substring(key.length - 4)}` : 'NOT SET';

    async function testConnection() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="info">Testing connection...</div>';
      
      if (!key || key === 'YOUR_GROQ_API_KEY_HERE') {
        resultDiv.innerHTML = '<div class="error">❌ API key is missing or invalid</div>';
        return;
      }

      try {
        const headers = {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + key
        };

        const body = JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{role: 'user', content: 'Say "Hello, the API is working!"'}],
          max_tokens: 50,
          temperature: 0.7
        });

        console.log('Request Headers:', headers);
        console.log('Request Body:', body);

        const response = await fetch(GROQ_API_URL, {
          method: 'POST',
          headers: headers,
          body: body
        });

        console.log('Response Status:', response.status);
        console.log('Response Headers:', [...response.headers.entries()]);

        const responseText = await response.text();
        console.log('Response Body:', responseText);

        if (!response.ok) {
          resultDiv.innerHTML = `<div class="error">❌ API Error (${response.status})\n\n${responseText}</div>`;
          return;
        }

        const data = JSON.parse(responseText);
        const content = data?.choices?.[0]?.message?.content;

        if (content) {
          resultDiv.innerHTML = `<div class="success">✅ Success!\n\nModel: ${data.model}\nResponse: ${content}\n\nFull response:\n${JSON.stringify(data, null, 2)}</div>`;
        } else {
          resultDiv.innerHTML = `<div class="error">❌ Unexpected response format\n\n${responseText}</div>`;
        }
      } catch (err) {
        console.error('Test Error:', err);
        resultDiv.innerHTML = `<div class="error">❌ Connection Error\n\n${err.message}\n\nCheck browser console for details.</div>`;
      }
    }
  </script>
</body>
</html>
